paragraph=Control 4-wheel Mecanum robots with L298N, TB6612FNG, DRV8833, or Cytron drivers. Features include vector/joystick-style drive, field-centric control, smooth acceleration ramping, motor inversion, brake/coast modes, deadzone filtering, and non-blocking operation. Supports ESP32 LEDC PWM and standard Arduino analogWrite.
